# PRISM Integration Registry
#
# One entry per agent-callable resource. Adding a tool = a reviewed PR here —
# no agent code changes. See docs/INTEGRATION_INTAKE.md for the per-tool form.
#
# Fields:
#   name        unique id
#   source      python | openapi | mcp | agent
#   enabled     true/false (Part-A default: ON)
#   description shown in Settings → Tools & Capabilities + GET /integrations
#   auth        {type: none|api_key|bearer, env: VAR_NAME, header: X-API-Key}
#                 secret is read from the env var — NEVER inline a secret here
#   config      source-specific (entrypoint / spec_url / transport+url / ...)

# ── Live: stock-chat (teammate REST service; we wire ONLY POST /tools/read) ──
# Intake said the agent must use exactly one endpoint, so we expose a single
# typed tool (a python wrapper) rather than auto-generating every endpoint from
# its OpenAPI spec. Base URL via env STOCK_CHAT_URL; the service has no caller
# auth (network-restricted).
- name: stock-chat
  source: python
  enabled: true
  description: >
    Indian NSE/BSE filings service (650k catalog). Exposes three tools:
    filings narrative Q&A (reads PDFs, cited evidence with [Company | p.N]
    citations — covers strategy, risks, MD&A, sustainability, governance,
    board decisions, dividends, board members / directors, sector roundups
    across 16 curated sectors), catalog lookup (which filings exist), and
    live technicals (price/RSI/MACD). The narrative tool has its own LLM
    planner that handles all catalog filtering — the agent sends only the
    question and an optional company hint. Exact financials go to
    prism-financials.
  tags: [filings, research, market-data]
  config:
    entrypoint: "src.integrations.tools.stock_chat:STOCK_CHAT_TOOLS"

# ── Live: bmc (teammate read-on-demand 9-block canvas; replaces PRISM RAG BMC) ──
# Six agent-routable endpoints exposed as typed wrappers (get / generate /
# library / get_version / block_chat / diff). The export endpoint is binary
# and surfaced through the UI proxy at /api/v1/bmc/{ticker}/{version}/export,
# not as an agent tool. Base URL via env BMC_URL; no caller auth (network-
# restricted to PRISM backend's IP on :8012).
- name: bmc
  source: python
  enabled: true
  description: >
    Citation-grounded Business Model Canvas for an Indian NSE/BSE-listed
    company — 9 canonical Osterwalder blocks read on-demand from the
    company's own Annual Report + Investor Presentation + latest Result. Also
    per-block drill-down chat, JSON/PDF export, and temporal diff between two
    fiscal periods. Use for "business model" / "BMC <ticker>" / "compare X's
    business model FY24 vs FY26". Not for exact numbers (those go to PRISM
    compute_*); not for one-shot questions about a single filing (those go
    to stock_filings_read).
  tags: [bmc, research]
  config:
    entrypoint: "src.integrations.tools.bmc:BMC_TOOLS"

# ── Live: prism-financials (teammate REST text-to-SQL over CMIE Prowess) ──────
# One agent-relevant endpoint (POST /ask) exposed as a single typed wrapper —
# no OpenAPI spec yet, and the surface is one endpoint. This is PRISM's
# exact-numbers path (the NRE math tools stay unwired; this service reads the
# real figures). Base URL via env PRISM_FINANCIALS_URL; no caller auth today
# (open endpoint) — PRISM_FINANCIALS_API_KEY is sent only when set.
- name: prism-financials
  source: python
  enabled: true
  description: >
    Numerical Q&A over Indian listed companies (CMIE Prowess) — balance sheet,
    P&L, cash flow, quarterly, shareholding, market multiples (P/E, P/B, market
    cap), and derived ratios (D/E, margins, CAGR, YoY, sector rank). Generates
    safe read-only SQL and returns structured rows + the executed query. This
    is the exact-figures / ranking / time-series path; filings narrative goes to
    stock_filings_read and live prices to stock_technicals.
  tags: [financials, numbers, research]
  config:
    entrypoint: "src.integrations.tools.prism_financials:PRISM_FINANCIALS_TOOLS"

# ── Live: prism-news (teammate REST financial-news + sentiment service) ───────
# The intake recommends `openapi`, but we wire `python` — same convention as
# the other three teammate services. Auto-generating from the OpenAPI spec
# would expose ~9 operations (incl. ops-only /health, /stats) and clutter the
# LLM context; the typed wrapper exposes only the 4 agent-useful tools, trims
# bulky article payloads, and inherits the structured error contract. The
# frontend /news page talks through PRISM's own /api/v1/news/* proxy router
# (one CORS/auth surface), mirroring the BMC pattern. Base URL via env
# PRISM_NEWS_URL; no caller auth today — PRISM_NEWS_API_KEY sent only when set.
- name: prism-news
  source: python
  enabled: true
  description: >
    Live Indian financial-news intelligence — per-company sentiment verdict
    (bullish/bearish/neutral + trend), trending stocks, headline search by
    company or sector (8 sectors), and multi-company sentiment compare. Backed
    by 82 RSS feeds + OpenAI sentiment + a 4,149-company alias master. Use for
    market reaction / mood / "what's the news on X" / "what's trending" /
    sector news. Indian-listed names only; 10-day max window. Not for live
    prices (stock_technicals), exact figures (financials_query), or what a
    filing said (stock_filings_read).
  tags: [news, sentiment, research, market-data]
  config:
    entrypoint: "src.integrations.tools.prism_news:PRISM_NEWS_TOOLS"


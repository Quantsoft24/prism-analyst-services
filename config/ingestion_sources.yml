# ── PRISM Ingestion Source Registry ──────────────────────────────────────
#
# Declarative list of filings to ingest. Each entry becomes one `filings`
# row + its chunks once the pipeline runs (python -m scripts.ingest_filings).
#
# This file IS the coverage universe for filings. Expanding to NSE-100 =
# appending entries here (a reviewable PR). In Slice 5C this moves to a
# DB-backed `ingestion_sources` table; `FilingsRegistry` is the seam.
#
# Fields:
#   ticker:        NSE ticker — must already exist in the `companies` table
#   filing_type:   quarterly_result | annual_report | concall_transcript |
#                  investor_presentation | agm_resolution | sebi_disclosure
#   source_url:    absolute URL (http/https) OR file:// for manually-downloaded PDFs
#   fiscal_period: Indian FY period, e.g. Q4-FY26, FY26 (optional)
#   filed_at:      ISO date the document was filed (optional)
#   title:         human-readable label (optional)
#
# ── FIRST INGESTION (local files) ─────────────────────────────────────────
# NSE/BSE block automated downloads, so we use manually-downloaded PDFs via
# file:// URLs. Download the two PDFs below into:
#   prism-analyst-services/.data/filings/manual/
# with the EXACT filenames shown, then run:
#   python -m scripts.ingest_filings
# (run from the prism-analyst-services/ directory so the relative paths resolve)
# ──────────────────────────────────────────────────────────────────────────

- ticker: TCS
  filing_type: quarterly_result
  fiscal_period: Q4-FY26
  source_url: file://./.data/filings/manual/tcs_q4_fy26_factsheet.pdf
  filed_at: 2026-04-09
  title: Tata Consultancy Services — Q4 FY26 Fact Sheet

- ticker: INFY
  filing_type: quarterly_result
  fiscal_period: Q4-FY26
  source_url: file://./.data/filings/manual/infosys_q4_fy26_factsheet.pdf
  filed_at: 2026-04-15
  title: Infosys — Q4 FY26 Fact Sheet

# ── PRISM Ingestion Source Registry ──────────────────────────────────────
#
# Declarative list of filings to ingest. Each entry becomes one `filings`
# row + its chunks once the Slice 5B pipeline runs.
#
# This file IS the coverage universe for filings. Expanding to NSE-100 =
# appending entries here (a reviewable PR). In Slice 5C this moves to a
# DB-backed `ingestion_sources` table; `FilingsRegistry` is the seam so
# consumers don't change.
#
# Fields:
#   ticker:        NSE ticker — must already exist in the `companies` table
#   filing_type:   quarterly_result | annual_report | concall_transcript |
#                  investor_presentation | agm_resolution | sebi_disclosure
#   source_url:    absolute URL to the source document (http/https/file/s3)
#   fiscal_period: Indian FY period, e.g. Q4-FY26, FY26 (optional)
#   filed_at:      ISO date the document was filed (optional)
#   title:         human-readable label (optional)
#
# NOTE: The URLs below are placeholders for Slice 5A foundation work. They
# are NOT downloaded yet — Slice 5B wires the actual fetch + parse. Replace
# with verified NSE/BSE archive URLs before running real ingestion.
# ──────────────────────────────────────────────────────────────────────────


name: CI

on:
  pull_request:
    branches: [main, production]
  push:
    # Also run CI on production pushes so direct hotfixes don't bypass gates.
    branches: [main, production]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    # Spin up a real Postgres 17 with the pgvector extension preinstalled —
    # pytest hits this directly via TEST_DATABASE_URL. No mocks anywhere in
    # the test suite. The pgvector/pgvector image is the official one and
    # ships both pgvector + pgcrypto, which our migrations require.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prism_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Async URL for the app runtime
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/prism_test
      # Same URL is what conftest.py reads
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/prism_test
      # Disable SSL on the local CI Postgres
      DB_SSL_MODE: disable
      DEBUG: "true"
      # External-service URLs — typed wrappers degrade gracefully when these
      # are unreachable, but setting them keeps test logs predictable and
      # lets future integration tests skip cleanly via reachability checks.
      BMC_URL: http://localhost:8012
      STOCK_CHAT_URL: http://localhost:8011
      # CATALOG_DATABASE_URL deliberately UNSET — when blank, the catalog
      # engine doesn't initialise and /api/v1/companies + lookup_company
      # raise a clean RuntimeError. Tests that don't exercise the catalog
      # path are unaffected.
      CATALOG_DATABASE_URL: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[dev]

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing

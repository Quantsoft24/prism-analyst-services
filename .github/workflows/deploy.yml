name: 🚀 Deploy Backend to Production

on:
  push:
    branches: [production]

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🔐 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "═══════════════════════════════════════════"
            echo "  PRISM Backend — Production Deployment"
            echo "═══════════════════════════════════════════"

            cd ~/PRISM/prism-analyst-services

            echo "📥 Pulling latest production code..."
            git fetch origin production
            git checkout production
            git pull origin production

            echo "🔨 Building Docker image..."
            docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml build --no-cache backend

            echo "🚀 Restarting backend..."
            docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml up -d backend

            echo "⏳ Waiting for backend to start..."
            sleep 10

            echo "🩺 Verifying backend..."
            if curl -sf http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "✅ Backend is healthy"
            else
              echo "❌ Backend health check failed!"
              docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml logs backend --tail 30
              exit 1
            fi

            echo "📦 Applying database migrations (alembic upgrade head)..."
            # The new image ships the latest migration files; run them against
            # the live DB so the schema matches the code. Idempotent (no-op if
            # already at head). Backend is already up + healthy so the DB
            # connection settings are known good.
            if docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml \
                 exec -T backend alembic upgrade head; then
              echo "✅ Migrations up to date — $(docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml exec -T backend alembic current 2>/dev/null | tail -1)"
            else
              echo "❌ Alembic upgrade failed — see logs above"
              docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml logs backend --tail 30
              exit 1
            fi

            echo "🧹 Cleaning old images..."
            docker image prune -f

            echo ""
            echo "═══════════════════════════════════════════"
            echo "  ✅ Backend deployment complete!"
            echo "═══════════════════════════════════════════"

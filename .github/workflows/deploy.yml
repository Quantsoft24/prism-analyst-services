name: 🚀 Deploy Backend to Production

on:
  push:
    branches: [production]

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🔐 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "═══════════════════════════════════════════"
            echo "  PRISM Backend — Production Deployment"
            echo "═══════════════════════════════════════════"

            cd ~/PRISM/prism-analyst-services

            echo "📥 Syncing to latest production code..."
            # Hard-sync to origin/production. The EC2 working tree is a
            # deploy artifact, not a dev checkout — any local modifications
            # are stale hotfixes and must yield to what's in git.
            git fetch origin production
            git checkout production
            git reset --hard origin/production
            git clean -fd

            echo "🔨 Building Docker image..."
            docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml build --no-cache backend

            echo "🚀 Restarting backend..."
            docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml up -d backend

            echo "⏳ Waiting for backend to start..."
            sleep 10

            echo "🩺 Verifying backend..."
            if curl -sf http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "✅ Backend is healthy"
            else
              echo "❌ Backend health check failed!"
              docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml logs backend --tail 30
              exit 1
            fi

            echo "📦 Applying database migrations to the primary + all fallback DBs..."
            # Migrate every DB in DATABASE_URL + DATABASE_URL_FALLBACKS so the app
            # can fail over to any of them. Capped/unreachable URLs (e.g. a Neon
            # project past its compute quota) are skipped with a warning — the
            # step fails ONLY if every database is unreachable. Idempotent (no-op
            # if already at head). A plain `alembic upgrade head` here would hard-
            # fail the deploy whenever the primary alone is capped.
            if docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml \
                 exec -T backend python scripts/migrate_all_dbs.py; then
              echo "✅ Migrations applied to all reachable databases"
            else
              echo "❌ Migration failed — every configured database was unreachable"
              docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml logs backend --tail 30
              exit 1
            fi

            echo "🛠  Starting / refreshing the backtest worker..."
            # Reuses the freshly built `prism-backend:latest` image (different
            # entrypoint), so no extra build. Started AFTER migrations so the
            # pb_* tables exist before it claims any job. Without this, submitted
            # backtests stay `queued` forever.
            docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml up -d worker
            echo "✅ Worker up — $(docker compose -f ~/PRISM/prism-analyst-platform/docker-compose.prod.yml ps worker --format '{{.Status}}' 2>/dev/null | tail -1)"

            echo "🧹 Cleaning old images..."
            docker image prune -f

            echo ""
            echo "═══════════════════════════════════════════"
            echo "  ✅ Backend deployment complete!"
            echo "═══════════════════════════════════════════"
